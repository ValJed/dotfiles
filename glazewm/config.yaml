# ════════════════════════════════════════════════════════════════════════════
# GlazeWM config — session VDI Windows
# Reprend la structure et les raccourcis du config Hyprland du poste Linux,
# avec ALT à la place de SUPER (Windows réserve trop de combos avec la touche
# Win pour qu'elle soit fiable comme mod key).
# Emplacement par défaut : %userprofile%\.glzr\glazewm\config.yaml
# ════════════════════════════════════════════════════════════════════════════

# ─── General ──────────────────────────────────────────────────────────────────

general:
  startup_commands: ["shell-exec zebar"]
  shutdown_commands: ["shell-exec taskkill /IM zebar.exe /F"]
  config_reload_commands: []
  focus_follows_cursor: false
  toggle_workspace_on_refocus: true
  cursor_jump:
    enabled: true
    trigger: "monitor_focus"

window_behavior:
  initial_state: "tiling"

# ─── Appearance ───────────────────────────────────────────────────────────────
# GlazeWM ne compose pas le bureau comme Hyprland : pas de blur/rounding/
# animations possibles, seulement les gaps et la bordure de focus.

gaps:
  inner_gap: "5px"
  outer_gap: "5px"

focus_borders:
  active:
    enabled: true
    color: "#c4a7e7"
  inactive:
    enabled: false

# ─── Workspaces ───────────────────────────────────────────────────────────────
# Contrairement à Hyprland, GlazeWM exige que les workspaces soient déclarés.

workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"
  - name: "10"

# ─── Window Rules ─────────────────────────────────────────────────────────────
# Exemple de routage automatique vers un workspace, comme tes ws-discord /
# ws-slack côté Hyprland. Ajuste window_process avec les vrais noms de
# process de tes apps pro (outil "Winlister" pour les retrouver).

window_rules:
  - commands: ["ignore"]
    match:
      - window_process: {equals: "zebar"}
  - commands: ["move --workspace 2"]
    match:
      - window_process: { equals: "Teams" }
      - window_process: { equals: "OUTLOOK" }

# ─── Keybinds ─────────────────────────────────────────────────────────────────

keybindings:
  # Window management
  - commands: ["close"]
    bindings: ["alt+q"]
  - commands: ["wm-exit"]
    bindings: ["alt+shift+m"]
  - commands: ["toggle-floating"]
    bindings: ["alt+v"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+t"]
  - commands: ["set-fullscreen --maximized"]
    bindings: ["alt+w"]
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+a"]

  # Launchers — à remplacer par ce qui est réellement installé sur la VDI
  - commands: ["shell-exec wt"]
    bindings: ["alt+enter"]
  - commands: ["shell-exec explorer"]
    bindings: ["alt+f"]
  - commands: ["shell-exec msedge"]
    bindings: ["alt+b"]

  # Focus
  - commands: ["focus --direction left"]
    bindings: ["alt+h"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j"]

  # Move windows
  - commands: ["move --direction left"]
    bindings: ["alt+shift+h"]
  - commands: ["move --direction down"]
    bindings: ["alt+shift+j"]
  - commands: ["move --direction up"]
    bindings: ["alt+shift+k"]
  - commands: ["move --direction right"]
    bindings: ["alt+shift+l"]

  # Workspaces — focus
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["alt+9"]
  - commands: ["focus --workspace 10"]
    bindings: ["alt+0"]

  # Workspaces — déplacer la fenêtre + suivre
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["alt+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["alt+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["alt+shift+9"]
  - commands: ["move --workspace 10", "focus --workspace 10"]
    bindings: ["alt+shift+0"]

  # Entrer en mode resize
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]

# ─── Resize Submap ────────────────────────────────────────────────────────────

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]
